<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salon3D</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:#000;
}

#ui{
position:absolute;
top:20px;
left:20px;
background:rgba(255,255,255,0.9);
padding:16px;
border-radius:12px;
width:260px;
box-shadow:0 4px 20px rgba(0,0,0,0.25);
}

#ui h2{
margin-top:0;
margin-bottom:10px;
}

#ui p{
font-size:14px;
line-height:1.4;
}

button{
margin-top:10px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#111;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#333;
}

canvas{
display:block;
}

</style>

</head>

<body>

<div id="ui">

<h2>Salon3D</h2>

<p>
Klick ins Bild → Maus-Look (Pointer Lock)<br>
WASD / Pfeile → bewegen<br>
Shift → schneller<br>
Space → kleiner Hopser<br><br>

ESC → Maus frei<br>
R → Reset Position
</p>

<button id="enterBtn">
Start / Maus aktivieren
</button>

</div>


<script type="module" src="./assets/js/main.js"></script>


</body>
</html>
