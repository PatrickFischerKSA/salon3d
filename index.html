<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Salon3D – Biedermeier</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <div id="hud">
    <div class="title">Salon3D</div>
    <div class="controls">
      Klick ins Bild → Maus-Look (Pointer Lock)<br/>
      WASD / Pfeile → bewegen · Shift → schneller · Space → “kleiner Hopser”<br/>
      ESC → Maus frei · R → Reset Position
    </div>
    <button id="enterBtn">Start / Maus aktivieren</button>
  </div>

  <div id="crosshair" aria-hidden="true"></div>

  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
