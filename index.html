<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Salon3D</title>

  <!-- verhindert favicon-404 -->
  <link rel="icon" href="data:," />

  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
    canvas { display:block; }

    .hud {
      position: fixed;
      left: 18px; top: 18px;
      width: 360px;
      background: #efefef;
      border-radius: 18px;
      padding: 18px 18px 16px 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,.35);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      z-index: 10;
    }
    .hud h1 { margin:0 0 10px 0; font-size: 32px; line-height:1.05; }
    .hud p { margin: 0 0 12px 0; font-size: 14px; line-height: 1.35; }
    .hud .btn {
      display:inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="hud">
    <h1>Salon3D</h1>
    <p>
      Klick ins Bild → Maus-Look (Pointer Lock)<br>
      WASD / Pfeile → bewegen<br>
      Shift → schneller<br>
      Space → kleiner Hopser<br><br>
      ESC → Maus frei<br>
      R → Reset Position
    </p>
    <button class="btn" id="enterBtn">Start / Maus aktivieren</button>
  </div>

  <!-- ✅ MUSS module sein -->
  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
