<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Salon3D</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { background: #111; overflow: hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    canvas { display: block; }

    /* Left HUD */
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 330px;
      max-width: calc(100vw - 32px);
      background: rgba(245, 245, 245, 0.92);
      border-radius: 14px;
      padding: 18px 18px 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,.25);
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    #hud h1 {
      margin: 0 0 10px 0;
      font-size: 32px;
      letter-spacing: .2px;
    }
    #hud .help {
      font-size: 14px;
      line-height: 1.45;
      margin: 0 0 14px 0;
      color: #111;
      white-space: pre-line;
    }
    #startBtn {
      display: inline-block;
      border: 0;
      background: #111;
      color: #fff;
      padding: 12px 14px;
      border-radius: 10px;
      font-weight: 650;
      cursor: pointer;
      width: 100%;
    }
    #statusLine {
      margin-top: 10px;
      font-size: 13px;
      color: #222;
    }
  </style>

  <!-- Import map: fixes "Failed to resolve module specifier 'three'" -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <div id="hud">
    <h1>Salon3D</h1>
    <p class="help">Klick ins Bild → Maus-Look (Pointer Lock)
WASD / Pfeile → bewegen
Shift → schneller
Space → kleiner Hopser

ESC → Maus frei
R → Reset Position</p>

    <button id="startBtn">Start / Maus aktivieren</button>
    <div id="statusLine">Lade…</div>
  </div>

  <script type="module" src="/salon3d/assets/js/main.js"></script>
</body>
</html>
