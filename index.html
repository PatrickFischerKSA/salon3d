<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salon3D</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
font-family:Arial, Helvetica, sans-serif;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:20px;
left:20px;
width:260px;
background:rgba(255,255,255,0.9);
padding:18px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
z-index:10;
}

#ui h2{
margin-top:0;
margin-bottom:10px;
}

#ui p{
font-size:14px;
line-height:1.45;
}

button{
margin-top:10px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#111;
color:white;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#333;
}

#status{
margin-top:10px;
font-size:13px;
opacity:0.75;
}

</style>

</head>

<body>

<div id="ui">

<h2>Salon3D</h2>

<p>
Klick ins Bild → Maus-Look (Pointer Lock)<br>
WASD / Pfeile → bewegen<br>
Shift → schneller<br>
Space → kleiner Hopser
</p>

<p>
ESC → Maus frei<br>
R → Reset Position
</p>

<button id="enterBtn">
Start / Maus aktivieren
</button>

<div id="status">
Lade Texturen...
</div>

</div>

<script type="module" src="./assets/js/main.js"></script>

</body>
</html>
