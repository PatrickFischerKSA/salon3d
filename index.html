<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Salon3D</title>

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:#000;
      font-family:Arial, Helvetica, sans-serif;
    }

    canvas{
      display:block;
    }

    #ui{
      position:absolute;
      top:20px;
      left:20px;
      background:rgba(255,255,255,0.92);
      padding:16px;
      border-radius:12px;
      width:260px;
      box-shadow:0 5px 20px rgba(0,0,0,0.3);
    }

    #ui h2{
      margin:0 0 10px 0;
    }

    #ui p{
      font-size:14px;
      line-height:1.45;
      margin:0;
    }

    button{
      margin-top:10px;
      padding:10px 14px;
      border:none;
      border-radius:8px;
      background:#111;
      color:white;
      font-size:14px;
      cursor:pointer;
    }

    button:hover{
      background:#333;
    }
  </style>
</head>

<body>
  <div id="ui">
    <h2>Salon3D</h2>

    <p>
      Klick ins Bild → Maus-Look (Pointer Lock)<br>
      WASD / Pfeile → bewegen<br>
      Shift → schneller<br>
      Space → kleiner Hopser<br><br>
      ESC → Maus frei<br>
      R → Reset Position
    </p>

    <button id="enterBtn">Start / Maus aktivieren</button>
  </div>

  <!-- Wichtig: main.js ist ein ES-Module -->
  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
